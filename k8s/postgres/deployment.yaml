apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: ecommerce

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres
    
  template:
    metadata:
      labels:
        app: postgres
  
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ecommerce

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: DB_USER
            
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: DB_PASSWORD
              
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
        
      volumes:
        - name: postgres-storage          
          persistentVolumeClaim:
            claimName: postgres-pvc
        
        - name: postgres-init
          configMap:
            name: postgres-init